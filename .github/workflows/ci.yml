name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 템플릿 사용 안내 ---
      # 이 파일은 GitHub Actions의 기본 구조입니다.
      # 프로젝트의 언어/프레임워크에 맞춰 아래 설정들을 채워주세요.
      # 예: Setup Node.js / Python / Go 등

      - name: Setup Environment
        run: echo "환경 설정을 추가하세요 (예: actions/setup-node 등)"

      - name: Install dependencies
        run: echo "의존성 설치 명령어를 입력하세요 (예: npm ci, pip install -r requirements.txt)"

      - name: Run Tests
        run: echo "테스트 실행 명령어를 입력하세요 (예: npm test, pytest)"

      - name: Run Linter
        run: echo "린트 검사 명령어를 입력하세요 (예: npm run lint, flake8)"
